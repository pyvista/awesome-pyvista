name: Ruby
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
      repository-projects: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Set up Ruby 2.6
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601
        with:
          ruby-version: 2.6.10
          bundler-cache: true
      - name: Checks
        run: bundle exec awesome_bot --allow-redirect --request-delay 1 README.md
